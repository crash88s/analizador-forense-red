<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tshoot Tool | By Selvin Mejia</title>
    <link rel="stylesheet" href="styles.css">
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="dark-mode">

    <!-- LANDING SCREEN -->
    <section id="landing-screen" class="full-screen">
        <div class="upload-box">
            <h1 class="neon-title">TSHOOT <span class="neon-text-green">TOOL</span></h1>
            <p class="subtitle">ADVANCED NETWORK FORENSICS</p>
            
            <div class="drop-zone" id="drop-zone">
                <div class="icon-upload">📡</div>
                <p>Drag Wireshark JSON here or click to browse</p>
                <input type="file" id="file-input" hidden accept=".json">
            </div>

            <div id="progress-container" class="hidden">
                <div class="progress-bar"><div id="progress-fill"></div></div>
                <p id="progress-text">Processing packets...</p>
            </div>
            <p class="credits-main">Software developed by Selvin Mejia</p>
        </div>
    </section>

    <!-- MAIN DASHBOARD -->
    <section id="main-dashboard" class="hidden">
        <header class="cyber-header">
            <div class="logo-area">
                <span class="logo-text">TSHOOT <span class="neon-text-green">TOOL</span></span>
            </div>
            
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">PACKETS</span>
                    <span id="stat-packets" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">ALERTS</span>
                    <span id="stat-alerts" class="stat-value text-danger">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">UNIQUE IPs</span>
                    <span id="stat-ips" class="stat-value text-blue">0</span>
                </div>
            </div>

            <div class="header-actions">
                <!-- EXPORT PDF moved here -->
                <button id="export-pdf" class="btn-neon-green">EXPORT PDF REPORT</button>
                <button id="btn-reset" class="btn-neon-blue">NEW FILE</button>
            </div>
        </header>

        <div class="app-container">
            <aside class="sidebar">
                <div class="sidebar-top">
                    <h3 class="filter-title">FORENSIC FILTERS</h3>
                    <div class="filter-group">
                        <label>Source IP</label>
                        <input type="text" id="filter-src-ip" placeholder="0.0.0.0">
                    </div>
                    <div class="filter-group">
                        <label>Destination IP</label>
                        <input type="text" id="filter-dst-ip" placeholder="0.0.0.0">
                    </div>
                    <div class="filter-group">
                        <label>Protocol</label>
                        <select id="filter-proto"></select>
                    </div>
                    <div class="filter-group">
                        <label>TCP Flags</label>
                        <input type="text" id="filter-flags" placeholder="SYN, RST, ACK...">
                    </div>
                    <!-- ERRORS button moved here -->
                    <button id="btn-only-errors" class="btn-warn" style="width: 100%; margin-top: 10px;">ERRORS</button>
                </div>
                
                <div class="sidebar-bottom">
                    <p class="credits-neon">By Selvin Mejia</p>
                </div>
            </aside>

            <main class="content">
                <div class="charts-row">
                    <div class="chart-box">
                        <canvas id="chart-protocols"></canvas>
                    </div>
                    <div class="chart-box">
                        <canvas id="chart-ports"></canvas>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table id="traffic-table">
                        <thead>
                            <tr>
                                <th>Delta Time</th>
                                <th>Source IP</th>
                                <th>Destination IP</th>
                                <th>Flags</th>
                                <th>Port</th>
                                <th>Status Analysis</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Data injected by JS -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </section>

    <script src="analyzer.js"></script>
</body>
</html>
