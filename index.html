<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Forensic & Tshoot Tool</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="dark-mode">
    <header class="cyber-header">
        <div class="logo"><span class="neon-text">TSHOOT</span> ANALYZER</div>
        <div class="stats-container">
            <div class="stat-card">Packets: <span id="stat-packets">0</span></div>
            <div class="stat-card">Throughput: <span id="stat-throughput">0 Mbps</span></div>
            <div class="stat-card">Errors: <span id="stat-alerts" class="text-danger">0</span></div>
        </div>
        <div class="actions">
            <button id="btn-only-errors" class="btn-warn">SOLO ERRORES</button>
            <button id="export-pdf" class="btn-neon">REPORT PDF</button>
        </div>
    </header>

    <div class="app-container">
        <aside class="sidebar">
            <h3>FILTROS DE RED</h3>
            <div class="filter-group">
                <label>IP Origen/Destino</label>
                <input type="text" id="filter-ip" placeholder="Filtrar IP...">
            </div>
            <div class="filter-group">
                <label>Protocolo</label>
                <select id="filter-proto"><option value="all">Todos</option></select>
            </div>
            <div class="filter-group">
                <label>Flags TCP</label>
                <input type="text" id="filter-flags" placeholder="SYN, RST, etc.">
            </div>
            
            <div class="drop-zone" id="drop-zone">
                Arrastra JSON de Wireshark aquí
                <input type="file" id="file-input" hidden accept=".json">
            </div>
            <p class="credits">aplicacion realizada por Selvin Mejia</p>
        </aside>

        <main class="content">
            <div class="charts-grid">
                <div class="chart-container wide">
                    <canvas id="chart-timeline"></canvas>
                </div>
                <div class="chart-container">
                    <canvas id="chart-protocols"></canvas>
                </div>
            </div>

            <div class="table-container">
                <table id="traffic-table">
                    <thead>
                        <tr>
                            <th>Delta (s)</th>
                            <th>Origen</th>
                            <th>Destino</th>
                            <th>Flags</th>
                            <th>Size</th>
                            <th>Status/Info</th>
                            <th>Análisis Tshoot</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="analyzer.js"></script>
</body>
</html>
